<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dab Counter</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(34,197,94,0.18), transparent 30%),
        linear-gradient(180deg, #0b1120, #111827 55%, #0f172a);
      color: var(--text);
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      position: relative;
    }

    .topbar {
      width: 100%;
      max-width: 960px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text);
      background: var(--panel-2);
    }

    button:hover { filter: brightness(1.08); }

    .icon-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 10px 12px;
    }

    .hero {
      width: 100%;
      max-width: 960px;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 16px;
      margin-top: 30px;
    }

    .count-wrap {
      font-size: 18px;
      color: var(--muted);
    }

    #countNumber {
      display: block;
      font-size: 72px;
      line-height: 1;
      font-weight: 800;
      color: var(--text);
      margin-top: 8px;
    }

    .stage {
      margin-top: 24px;
      width: min(520px, 90vw);
      aspect-ratio: 1 / 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    #hotspot {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.1);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), transparent 20%),
        radial-gradient(circle at center, #22c55e, #15803d 70%);
      box-shadow: 0 20px 80px rgba(34,197,94,0.35), inset 0 8px 20px rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      font-size: 36px;
      font-weight: 800;
      user-select: none;
      transition: transform 120ms ease, filter 120ms ease;
    }

    #hotspot:active {
      transform: scale(0.98);
      filter: brightness(0.95);
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
    }

    .bubble-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .name-bubble {
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      animation: floatUp 1.6s ease forwards;
      white-space: nowrap;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -180px) scale(1.08); }
    }

    .burst {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #86efac;
      pointer-events: none;
      animation: pop 650ms ease-out forwards;
    }

    @keyframes pop {
      from { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(8); }
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,0.58);
      z-index: 20;
    }

    .overlay.open { display: flex; }

    .modal {
      width: min(100%, 440px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .modal p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .input,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 14px;
    }

    .input:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-primary {
      background: var(--accent);
      color: #04130a;
      font-weight: 700;
    }

    .btn-secondary {
      background: #374151;
    }

    .drawer {
      width: min(100%, 520px);
      max-height: min(80vh, 700px);
      overflow: auto;
    }

    .drawer-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .drawer-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .drawer-name {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .drawer-time {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .empty-state {
      color: var(--muted);
      text-align: center;
      padding: 20px 0 6px;
    }

    @media (max-width: 640px) {
      #countNumber { font-size: 56px; }
      #hotspot { font-size: 30px; }
      .topbar { align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">Dab Counter</div>
      <div class="actions">
        <button id="seeListBtn">See List</button>
        <button id="gearBtn" class="icon-btn" aria-label="Settings">⚙️</button>
      </div>
    </div>

    <section class="hero">
      <div class="count-wrap">
        Total dabs
        <span id="countNumber">0</span>
      </div>

      <div class="stage">
        <button id="hotspot" aria-label="Trigger dab">DAB</button>
      </div>

      <div class="hint">Tap the button, enter your name, and it gets saved live.</div>
    </section>
  </div>

  <div class="bubble-layer" id="bubbleLayer"></div>

  <div class="overlay" id="nameOverlay">
    <div class="modal">
      <h2>Who dabbed?</h2>
      <p>Enter your name to log the dab.</p>
      <input id="nameInput" class="input" type="text" maxlength="24" placeholder="Your name" />
      <div class="modal-actions">
        <button id="cancelDab" class="btn-secondary">Cancel</button>
        <button id="confirmDab" class="btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="drawerOverlay">
    <div class="modal drawer">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
        <h2 style="margin:0;">Dabbers</h2>
        <button id="drawerClose" class="icon-btn" aria-label="Close list">✕</button>
      </div>
      <div id="drawerList" class="drawer-list"></div>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h2>Settings</h2>
      <p>Optional: set a custom second sound URL.</p>
      <input id="soundUrlInput" class="input" type="url" placeholder="https://example.com/sound.mp3" />
      <div class="modal-actions">
        <button id="settingsCancel" class="btn-secondary">Cancel</button>
        <button id="settingsSave" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
